<!-- 为什么要改：Webview View 需要一个矢量徽章挂到 VS Code Activity Bar，避免继续使用无图标的临时入口。
     怎么改：用单个 SVG 文件绘制一个简洁的圆形徽章和中心闪光标记，供 viewsContainers 和 views 共同引用。
     目的是什么：让侧边栏入口在视觉上可识别，同时保持资源是本地、轻量、可版本管理的矢量文件。 -->
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M12 2.25C6.615 2.25 2.25 6.615 2.25 12C2.25 17.385 6.615 21.75 12 21.75C17.385 21.75 21.75 17.385 21.75 12C21.75 6.615 17.385 2.25 12 2.25Z" stroke="currentColor" stroke-width="1.7"/>
  <path d="M12 5.25L13.78 10.22L18.75 12L13.78 13.78L12 18.75L10.22 13.78L5.25 12L10.22 10.22L12 5.25Z" fill="currentColor"/>
</svg>
